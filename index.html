<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Inventory Management</h1>
      <!-- NOTE: Dashboard Section -->
      <div class="dashboard">
        <div class="dashboard-card">
          <h3>Total Products</h3>
          <p id="totalProduct">0</p>
        </div>
        <div class="dashboard-card">
          <h3>Total Quanitity</h3>
          <p id="totalQuantity">0</p>
        </div>
        <div class="dashboard-card">
          <h3>Low Stock Products</h3>
          <p id="lowStockItem">0</p>
        </div>
        <div class="dashboard-card">
          <h3>Used Storage Space</h3>
          <div class="storage-already-used" id="storageUsed">
            <!-- The room location will be updated according to the location plan section -->
          </div>
        </div>
      </div>
      <!-- NOTE: Add Product Form Section -->
      <div class="app-container">
        <div class="form-container">
          <h2>Add New Product</h2>
          <form id="inventoryForm">
            <div class="form-group">
              <label for="productName">Product Name</label>
              <input type="text" id="productName" name="productName" required />
            </div>

            <div class="form-group">
              <label for="productQuantity">Product Quantity</label>
              <input
                type="number"
                id="productQuantity"
                name="productQuantity"
                required
              />
            </div>

            <div class="form-group">
              <label for="productPrice">Product Price</label>
              <input
                type="number"
                id="productPrice"
                name="productPrice"
                min="0.00"
                max="100000.00"
                step="0.01"
                required
              />
            </div>

            <div class="form-group">
              <label for="productSection">Product Category</label>
              <select name="productSection" id="productSection" required>
                <option value="">Select Type</option>
                <option value="Gold">Gold</option>
                <option value="Silver">Silver</option>
              </select>
            </div>

            <div class="form-group">
              <label for="productDescription">Product Description</label>
              <textarea
                name="productDescription"
                id="productDescription"
              ></textarea>
            </div>

            <!-- NOTE: This needs to change into something else that user can manually type in the location -->
            <div class="form-group">
              <label for="productLocation">Location</label>
              <textarea id="productLocation" name="productLocation" required></textarea>
            </div>

            <button type="submit">Add Product</button>
          </form>
        </div>

        <!-- NOTE: Inventory Information Section -->
        <div class="inventory-info-section">
          <h2>Current Inventory</h2>
          <div class="inventory-list" id="inventoryList">
            <!-- Product will be added here later -->
          </div>
        </div>

        <!-- NOTE: Location Plan Section -->
        <div class="room-plan">
          <h2>Storage Location</h2>
          <div class="location-list" id="locationList">
            <!-- Location will be added here later -->
          </div>
        </div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
